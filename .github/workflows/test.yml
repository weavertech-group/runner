name: Repository tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Test happy-path workflow
        shell: bash
        run: bash tests/happy-path-workflow.test.sh

      - name: Test Lark Webhook foundation
        shell: bash
        run: bash tests/lark-webhook.test.sh

      - name: Check shell syntax
        shell: bash
        run: bash -n scripts/*.sh scripts/lib/*.sh tests/*.sh
