name: Repository tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository quietly
        shell: bash
        run: |
          set -euo pipefail
          git init -q
          git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD

      - name: Install shellcheck and actionlint
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          shellcheck --version
          ./actionlint -version

      - name: Lint GitHub Actions workflows
        shell: bash
        run: ./actionlint -color

      - name: ShellCheck scripts and tests
        shell: bash
        run: |
          set -o pipefail
          shellcheck --severity=bash tests/*.sh 2>&1 | tail -n 40

      - name: Test workflow security contract
        shell: bash
        run: bash tests/workflow-security.test.sh

      - name: Test Node actions
        shell: bash
        run: node --test tests/*.test.js
