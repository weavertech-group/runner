name: Private Runner Session

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: Optional public opaque target identifier
        required: false
        type: string
      enable_ssh:
        description: Enable private SSH access
        required: false
        default: true
        type: boolean
      enable_devspace:
        description: Start DevSpace MCP for the selected target repository
        required: false
        default: false
        type: boolean
      ssh_public_key:
        description: Optional fallback Ed25519 public key
        required: false
        type: string

run-name: Private runner session

permissions:
  actions: read
  contents: read

concurrency:
  group: private-runner-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve target
    runs-on: ubuntu-24.04
    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}
    steps:
      - name: Prepare
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Resolve target
        id: resolve
        shell: bash
        env:
          TARGET_ID: ${{ inputs.target_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          environment_name="$(bash scripts/session-lib.sh resolve-target \
            "$TARGET_ID" .github/target-repositories.txt)"
          bash scripts/verify-environment.sh "$environment_name"
          printf 'environment_name=%s\n' "$environment_name" >> "$GITHUB_OUTPUT"

  runner:
    name: Session
    needs: resolve-target
    runs-on: ubuntu-24.04
    # GitHub-hosted jobs have a hard six-hour execution limit. Keep the runner
    # alive until the platform terminates the job instead of exiting early.
    timeout-minutes: 360
    environment:
      name: ${{ needs.resolve-target.outputs.environment_name }}
      deployment: false
    steps:
      - name: Prepare
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate optional service request
        if: ${{ inputs.enable_devspace && (inputs.target_id == '' || ! inputs.enable_ssh) }}
        shell: bash
        run: |
          printf 'E50\n' >&2
          exit 50

      - name: Prepare Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.22.2

      - name: Install development environment
        shell: bash
        run: bash scripts/setup-development-environment.sh

      - name: Install Codex CLI
        shell: bash
        run: npm install -g @openai/codex@latest

      - name: Install Claude Code
        shell: bash
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Verify development environment
        shell: bash
        run: bash scripts/verify-development-environment.sh

      - name: Prepare network
        if: ${{ inputs.enable_ssh }}
        shell: bash
        run: bash scripts/install-tailscale.sh

      - name: Connect
        if: ${{ inputs.enable_ssh }}
        shell: bash
        env:
          HEADSCALE_URL: ${{ secrets.HEADSCALE_URL }}
          HEADSCALE_AUTHKEY: ${{ secrets.HEADSCALE_AUTHKEY }}
          SSH_PUBLIC_KEY: ${{ inputs.ssh_public_key }}
        run: bash scripts/connect-headscale.sh

      - name: Prepare repository access
        if: ${{ inputs.target_id != '' }}
        shell: bash
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          TARGET_REPO_AUTH: ${{ secrets.TARGET_REPO_AUTH }}
        run: bash scripts/configure-repository-credential.sh

      - name: Start optional service
        if: ${{ inputs.enable_devspace }}
        shell: bash
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
        run: |
          bash scripts/install-cloudflared.sh
          bash scripts/start-devspace.sh

      - name: Execute
        if: ${{ inputs.enable_ssh }}
        shell: bash
        run: sleep infinity

      - name: Finalize
        if: ${{ always() }}
        shell: bash
        run: bash scripts/cleanup.sh
