name: Private Runner Session

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: Optional public opaque target identifier
        type: string
      enable_ssh:
        description: Enable private SSH access
        default: true
        type: boolean
      enable_devspace:
        description: Start DevSpace MCP for the selected target repository
        default: false
        type: boolean
      enable_t3code:
        description: Start T3 Code for the selected target repository
        default: false
        type: boolean
      non_durable:
        description: Finalize immediately after setup instead of keeping the session alive
        default: false
        type: boolean
      ssh_public_key:
        description: Optional fallback Ed25519 public key
        type: string

run-name: Private runner session

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  resolve-target:
    name: Resolve target
    runs-on: ubuntu-24.04
    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Resolve target
        id: resolve
        env:
          TARGET_ID: ${{ inputs.target_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          environment_name="$(bash scripts/session-lib.sh resolve-target \
            "$TARGET_ID" .github/target-repositories.txt)"
          bash scripts/verify-environment.sh "$environment_name"
          printf 'environment_name=%s\n' "$environment_name" >> "$GITHUB_OUTPUT"

  runner:
    name: Session
    needs: resolve-target
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    environment:
      name: ${{ needs.resolve-target.outputs.environment_name }}
      deployment: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate request
        if: ${{ (inputs.enable_devspace || inputs.enable_t3code) && (inputs.target_id == '' || ! inputs.enable_ssh) }}
        run: |
          printf '%s\n' 'Optional services require a target_id and enable_ssh=true.' >&2
          exit 1

      - name: Prepare Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1

      - name: Prepare cache keys
        id: cache-keys
        run: |
          set -euo pipefail
          # shellcheck source=scripts/development-versions.env
          source scripts/development-versions.env
          printf 'npm=%s\n' \
            "npm-v1-${RUNNER_OS}-${RUNNER_ARCH}-node-${NODE_VERSION}-$(date -u +%G-W%V)" \
            >> "$GITHUB_OUTPUT"

      - name: Restore development environment cache
        id: development-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.local/share/mise/shims
            ~/.cache/ms-playwright
            ~/.cache/private-runner/kubernetes
            ~/go/bin/migrate
            ~/.local/bin/uv
            ~/.local/bin/uvx
            ~/.local/bin/mise
          key: development-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/development-versions.env') }}

      - name: Restore npm download cache
        id: npm-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.npm
            ~/.cache/node/corepack
          key: ${{ steps.cache-keys.outputs.npm }}

      - name: Report session starting
        continue-on-error: true
        env:
          LARK_REPORTING_ENABLED: ${{ vars.LARK_REPORTING_ENABLED }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          SESSION_TARGET_ID: ${{ inputs.target_id }}
          SESSION_SSH_ONLINE: false
        run: bash scripts/report-session-event.sh starting

      - name: Prepare network
        if: ${{ inputs.enable_ssh }}
        run: bash scripts/install-tailscale.sh

      - name: Connect
        id: connect
        if: ${{ inputs.enable_ssh }}
        env:
          HEADSCALE_URL: ${{ secrets.HEADSCALE_URL }}
          HEADSCALE_AUTHKEY: ${{ secrets.HEADSCALE_AUTHKEY }}
          SSH_PUBLIC_KEY: ${{ inputs.ssh_public_key }}
        run: bash scripts/connect-headscale.sh

      - name: Report SSH online
        if: ${{ inputs.enable_ssh && steps.connect.outcome == 'success' }}
        continue-on-error: true
        env:
          LARK_REPORTING_ENABLED: ${{ vars.LARK_REPORTING_ENABLED }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          SESSION_TARGET_ID: ${{ inputs.target_id }}
          SESSION_SSH_ONLINE: true
          SESSION_RUNNER_NAME: gha-${{ github.run_id }}-${{ github.run_attempt }}
        run: bash scripts/report-session-event.sh ssh-online

      - name: Prepare repository access
        if: ${{ inputs.target_id != '' }}
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          TARGET_REPO_AUTH: ${{ secrets.TARGET_REPO_AUTH }}
        run: bash scripts/configure-repository-credential.sh

      - name: Mark development environment installing
        run: |
          set -euo pipefail
          install -d -m 0700 "$HOME/private-runner-session"
          printf 'installing\n' > "$HOME/private-runner-session/setup-status"
          chmod 0600 "$HOME/private-runner-session/setup-status"

      - name: Install development environment
        id: development-install
        continue-on-error: true
        env:
          DEVELOPMENT_CACHE_HIT: ${{ steps.development-cache.outputs.cache-hit }}
        run: bash scripts/setup-development-environment.sh

      - name: Verify fixed development environment
        id: fixed-verify
        continue-on-error: true
        env:
          VERIFY_AI_TOOLS: false
        run: bash scripts/verify-development-environment.sh

      - name: Save development environment cache
        if: ${{ steps.development-cache.outputs.cache-hit != 'true' && steps.development-install.outcome == 'success' && steps.fixed-verify.outcome == 'success' }}
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.local/share/mise/shims
            ~/.cache/ms-playwright
            ~/.cache/private-runner/kubernetes
            ~/go/bin/migrate
            ~/.local/bin/uv
            ~/.local/bin/uvx
            ~/.local/bin/mise
          key: development-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/development-versions.env') }}

      - name: Install AI coding CLIs
        id: ai-tools
        continue-on-error: true
        run: |
          npm install --global --no-audit --no-fund \
            @openai/codex@latest \
            @anthropic-ai/claude-code@latest

      - name: Verify complete development environment
        id: complete-verify
        continue-on-error: true
        run: bash scripts/verify-development-environment.sh

      - name: Save npm download cache
        if: ${{ steps.npm-cache.outputs.cache-hit != 'true' && steps.development-install.outcome == 'success' && steps.ai-tools.outcome == 'success' }}
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.npm
            ~/.cache/node/corepack
          key: ${{ steps.cache-keys.outputs.npm }}

      - name: Publish development environment status
        if: ${{ always() }}
        env:
          DEVELOPMENT_INSTALL: ${{ steps.development-install.outcome }}
          FIXED_VERIFY: ${{ steps.fixed-verify.outcome }}
          AI_TOOLS: ${{ steps.ai-tools.outcome }}
          COMPLETE_VERIFY: ${{ steps.complete-verify.outcome }}
        run: |
          set -euo pipefail
          install -d -m 0700 "$HOME/private-runner-session"
          status=degraded
          if [[ "$DEVELOPMENT_INSTALL" == success && \
                "$FIXED_VERIFY" == success && \
                "$AI_TOOLS" == success && \
                "$COMPLETE_VERIFY" == success ]]; then
            status=ready
          fi
          printf '%s\n' "$status" > "$HOME/private-runner-session/setup-status"
          printf '%s\n' \
            "development_install=$DEVELOPMENT_INSTALL" \
            "fixed_verify=$FIXED_VERIFY" \
            "ai_tools=$AI_TOOLS" \
            "complete_verify=$COMPLETE_VERIFY" \
            > "$HOME/private-runner-session/setup-details"
          chmod 0600 \
            "$HOME/private-runner-session/setup-status" \
            "$HOME/private-runner-session/setup-details"

      - name: Report development environment status
        if: ${{ always() }}
        continue-on-error: true
        env:
          LARK_REPORTING_ENABLED: ${{ vars.LARK_REPORTING_ENABLED }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          SESSION_TARGET_ID: ${{ inputs.target_id }}
          SESSION_SSH_ONLINE: ${{ inputs.enable_ssh && steps.connect.outcome == 'success' }}
          SESSION_ERROR_CODE: setup-degraded
        run: |
          case "$(cat "$HOME/private-runner-session/setup-status" 2>/dev/null || true)" in
            ready) bash scripts/report-session-event.sh setup-ready ;;
            degraded) bash scripts/report-session-event.sh setup-degraded ;;
          esac

      - name: Validate optional service prerequisites
        if: ${{ inputs.enable_devspace || inputs.enable_t3code }}
        env:
          ENABLE_DEVSPACE: ${{ inputs.enable_devspace }}
          ENABLE_T3CODE: ${{ inputs.enable_t3code }}
          FIXED_VERIFY: ${{ steps.fixed-verify.outcome }}
          COMPLETE_VERIFY: ${{ steps.complete-verify.outcome }}
        run: |
          set -euo pipefail
          if [[ "$ENABLE_DEVSPACE" == true && "$FIXED_VERIFY" != success ]]; then
            printf '%s\n' 'DevSpace was not started because fixed development environment verification failed.' >&2
            exit 1
          fi
          if [[ "$ENABLE_T3CODE" == true && "$COMPLETE_VERIFY" != success ]]; then
            printf '%s\n' 'T3 Code was not started because complete development environment verification failed.' >&2
            exit 1
          fi

      - name: Install optional service tools
        if: ${{ inputs.enable_devspace || inputs.enable_t3code }}
        env:
          ENABLE_T3CODE: ${{ inputs.enable_t3code }}
        run: |
          bash scripts/install-cloudflared.sh
          if [[ "$ENABLE_T3CODE" == true ]]; then
            bash scripts/install-t3code.sh
          fi

      - name: Prepare target workspace
        if: ${{ inputs.enable_devspace || inputs.enable_t3code }}
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
        run: bash scripts/prepare-target-workspace.sh

      - name: Start Cloudflare Quick Tunnels
        if: ${{ inputs.enable_devspace || inputs.enable_t3code }}
        env:
          ENABLE_DEVSPACE: ${{ inputs.enable_devspace }}
          ENABLE_T3CODE: ${{ inputs.enable_t3code }}
        run: bash scripts/start-quick-tunnels.sh

      - name: Start DevSpace
        if: ${{ inputs.enable_devspace }}
        run: bash scripts/start-devspace.sh

      - name: Start T3 Code
        if: ${{ inputs.enable_t3code }}
        run: bash scripts/start-t3code.sh

      - name: Verify public DevSpace
        id: verify-devspace-public
        if: ${{ inputs.enable_devspace }}
        continue-on-error: true
        env:
          ENABLE_DEVSPACE: true
          ENABLE_T3CODE: false
        run: bash scripts/verify-public-services.sh

      - name: Verify public T3 Code
        id: verify-t3code-public
        if: ${{ inputs.enable_t3code }}
        continue-on-error: true
        env:
          ENABLE_DEVSPACE: false
          ENABLE_T3CODE: true
        run: bash scripts/verify-public-services.sh

      - name: Report optional services online
        if: ${{ always() && (inputs.enable_devspace || inputs.enable_t3code) }}
        continue-on-error: true
        env:
          LARK_REPORTING_ENABLED: ${{ vars.LARK_REPORTING_ENABLED }}
          LARK_WEBHOOK_INCLUDE_TEMPORARY_ACCESS: ${{ vars.LARK_WEBHOOK_INCLUDE_TEMPORARY_ACCESS }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          SESSION_TARGET_ID: ${{ inputs.target_id }}
          SESSION_SSH_ONLINE: ${{ inputs.enable_ssh && steps.connect.outcome == 'success' }}
          ENABLE_DEVSPACE: ${{ inputs.enable_devspace }}
          ENABLE_T3CODE: ${{ inputs.enable_t3code }}
          DEVSPACE_PUBLIC_VERIFY: ${{ steps.verify-devspace-public.outcome }}
          T3CODE_PUBLIC_VERIFY: ${{ steps.verify-t3code-public.outcome }}
        run: |
          if [[ "$ENABLE_DEVSPACE" == true && "$DEVSPACE_PUBLIC_VERIFY" == success ]]; then
            SESSION_SERVICE=devspace bash scripts/report-session-event.sh service-online
          fi
          if [[ "$ENABLE_T3CODE" == true && "$T3CODE_PUBLIC_VERIFY" == success ]]; then
            SESSION_SERVICE=t3code bash scripts/report-session-event.sh service-online
          fi

      - name: Validate public optional services
        if: ${{ always() && (steps.verify-devspace-public.outcome != 'skipped' || steps.verify-t3code-public.outcome != 'skipped') }}
        env:
          ENABLE_DEVSPACE: ${{ inputs.enable_devspace }}
          ENABLE_T3CODE: ${{ inputs.enable_t3code }}
          DEVSPACE_PUBLIC_VERIFY: ${{ steps.verify-devspace-public.outcome }}
          T3CODE_PUBLIC_VERIFY: ${{ steps.verify-t3code-public.outcome }}
        run: |
          if [[ "$ENABLE_DEVSPACE" == true && "$DEVSPACE_PUBLIC_VERIFY" != success ]]; then
            printf '%s\n' 'Public DevSpace verification failed.' >&2
            exit 1
          fi
          if [[ "$ENABLE_T3CODE" == true && "$T3CODE_PUBLIC_VERIFY" != success ]]; then
            printf '%s\n' 'Public T3 Code verification failed.' >&2
            exit 1
          fi

      - name: Keep session alive
        if: ${{ inputs.enable_ssh && ! inputs.non_durable }}
        run: sleep infinity

      - name: Report session offline
        if: ${{ always() }}
        continue-on-error: true
        env:
          LARK_REPORTING_ENABLED: ${{ vars.LARK_REPORTING_ENABLED }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          SESSION_TARGET_ID: ${{ inputs.target_id }}
          SESSION_SSH_ONLINE: false
        run: bash scripts/report-session-event.sh offline

      - name: Finalize
        if: ${{ always() }}
        run: bash scripts/cleanup.sh
