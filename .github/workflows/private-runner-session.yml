name: Private T3 Session

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: Target repository identifier
        required: true
        type: string
      enable_ssh:
        description: Enable Headscale/Tailscale access
        default: false
        type: boolean
      non_durable:
        description: Finish after printing the T3 link
        default: false
        type: boolean
      ssh_public_key:
        description: Optional OpenSSH public key; if omitted and SSH is enabled, use Tailscale SSH
        required: false
        type: string

run-name: Private T3 session

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  resolve-target:
    name: Resolve target
    runs-on: ubuntu-24.04
    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - id: resolve
        env:
          TARGET_ID: ${{ inputs.target_id }}
        run: |
          set -euo pipefail

          environment_name="$(awk -v id="$TARGET_ID" '$1 == id { print $2 }' .github/target-repositories.txt)"
          [[ -n "$environment_name" ]]

          printf 'environment_name=%s\n' "$environment_name" >> "$GITHUB_OUTPUT"

  session:
    name: Session
    needs: resolve-target
    runs-on: ubuntu-24.04
    environment:
      name: ${{ needs.resolve-target.outputs.environment_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Define paths
        run: |
          set -euo pipefail

          {
            echo "WORKSPACE=$RUNNER_TEMP/workspace"
            echo "SESSION_DIR=$HOME/private-runner-session"
          } >> "$GITHUB_ENV"

      - name: Install development tools
        run: |
          set -euo pipefail

          if [[ -x scripts/setup-development-environment.sh ]]; then
            bash scripts/setup-development-environment.sh
          fi

          curl -fsSL https://chatgpt.com/codex/install.sh | sh
          curl -fsSL https://claude.ai/install.sh | bash

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          codex --version
          claude --version

      - name: Start OpenSSH
        if: ${{ inputs.enable_ssh && inputs.ssh_public_key != '' }}
        env:
          SSH_PUBLIC_KEY: ${{ inputs.ssh_public_key }}
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server

          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PUBLIC_KEY" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"

          sudo systemctl enable --now ssh

      - name: Join Headscale
        if: ${{ inputs.enable_ssh }}
        env:
          HEADSCALE_URL: ${{ secrets.HEADSCALE_URL }}
          HEADSCALE_AUTHKEY: ${{ secrets.HEADSCALE_AUTHKEY }}
          SSH_PUBLIC_KEY: ${{ inputs.ssh_public_key }}
        run: |
          set -euo pipefail

          curl -fsSL https://tailscale.com/install.sh | sh

          ts_args=(
            --login-server="$HEADSCALE_URL"
            --auth-key="$HEADSCALE_AUTHKEY"
            --hostname="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            --accept-dns=false
          )

          [[ -n "$SSH_PUBLIC_KEY" ]] || ts_args+=(--ssh)

          sudo tailscale up "${ts_args[@]}"

      - name: Configure repository access
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          TARGET_REPO_AUTH: ${{ secrets.TARGET_REPO_AUTH }}
        run: |
          set -euo pipefail

          git config --global credential.https://github.com.useHttpPath true
          git config --global credential.helper "store --file=$RUNNER_TEMP/target-repo-credential"

          printf 'protocol=https\nhost=github.com\npath=%s.git\nusername=x-access-token\npassword=%s\n\n' \
            "$TARGET_REPO" \
            "$TARGET_REPO_AUTH" \
            | git credential approve

      - name: Clone repository
        env:
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
        run: |
          set -euo pipefail

          git clone "https://github.com/${TARGET_REPO}.git" "$WORKSPACE"

      - name: Install cloudflared
        run: |
          set -euo pipefail

          sudo curl -fsSL \
            -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64

          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start T3 Code
        env:
          NON_DURABLE: ${{ inputs.non_durable }}
        run: |
          set -euo pipefail

          install -d -m 0700 "$SESSION_DIR/t3code"

          t3_log="$RUNNER_TEMP/t3code.log"
          tunnel_log="$RUNNER_TEMP/cloudflared.log"

          npx --yes t3@latest serve \
            --host 127.0.0.1 \
            --port 3773 \
            "$WORKSPACE" \
            > "$t3_log" 2>&1 &

          t3_pid="$!"

          cloudflared tunnel --url http://127.0.0.1:3773 \
            > "$tunnel_log" 2>&1 &

          tunnel_pid="$!"

          t3_token=""
          t3_backend_url=""

          for _ in {1..30}; do
            t3_backend_url="$(sed -nE 's#.*(https://[-a-z0-9]+[.]trycloudflare[.]com).*#\1#p' "$tunnel_log" | head -n1)"
            t3_token="$(sed -nE 's/^.*Token:[[:space:]]*([^[:space:]]+).*$/\1/p' "$t3_log" | head -n1)"

            if [[ -n "$t3_backend_url" && -n "$t3_token" ]]; then
              break
            fi

            if ! kill -0 "$t3_pid" 2>/dev/null; then
              echo "T3 Code exited before producing pairing information." >&2
              cat "$t3_log" >&2
              exit 1
            fi

            if ! kill -0 "$tunnel_pid" 2>/dev/null; then
              echo "cloudflared exited before producing a tunnel URL." >&2
              cat "$tunnel_log" >&2
              exit 1
            fi

            sleep 1
          done

          if [[ -z "$t3_backend_url" || -z "$t3_token" ]]; then
            echo "Failed to create T3 pairing link." >&2
            echo
            echo "cloudflared log:" >&2
            cat "$tunnel_log" >&2
            echo
            echo "T3 log:" >&2
            cat "$t3_log" >&2
            exit 1
          fi

          t3_link="https://app.t3.codes/pair?host=${t3_backend_url}#token=${t3_token}"

          printf '%s\n' "$t3_backend_url" > "$SESSION_DIR/t3code/backend-url"
          printf '%s\n' "$t3_token" > "$SESSION_DIR/t3code/token"
          printf '%s\n' "$t3_link" > "$SESSION_DIR/t3code/link"
          chmod 600 "$SESSION_DIR/t3code/backend-url" "$SESSION_DIR/t3code/token" "$SESSION_DIR/t3code/link"

          {
            echo "### T3 Code"
            echo
            echo "[Open T3 Code]($t3_link)"
            echo
            echo '```text'
            echo "$t3_link"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "T3 Code link:"
          echo "$t3_link"

          if [[ "$NON_DURABLE" != "true" ]]; then
            sleep infinity
          fi

      - name: Keep SSH session alive
        if: ${{ inputs.enable_ssh && ! inputs.non_durable && failure() }}
        run: sleep infinity