name: Private network
description: Join Headscale with Tailscale SSH.

inputs:
  headscale-url:
    description: Headscale control server URL.
    required: true
  auth-key:
    description: Headscale pre-authentication key.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: curl -fsSL https://tailscale.com/install.sh | sh

    - shell: bash
      env:
        HEADSCALE_URL: ${{ inputs.headscale-url }}
        HEADSCALE_AUTHKEY: ${{ inputs.auth-key }}
      run: |
        sudo tailscale up \
          --login-server="$HEADSCALE_URL" \
          --auth-key="$HEADSCALE_AUTHKEY" \
          --hostname="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
          --accept-dns=false \
          --ssh
